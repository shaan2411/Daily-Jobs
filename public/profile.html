<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Daily Jobs</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/" class="brand">
        <span class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </span>
        Daily<span class="brand-dot">Jobs</span>
      </a>
      <div class="nav-links" id="nav-links">
        <!-- Injected via JS -->
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <nav class="sidebar-nav">
          <a href="/dashboard" class="sidebar-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
          </a>
          <a href="/profile" class="sidebar-link active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            My Profile
          </a>
        </nav>
      </aside>

      <!-- Content -->
      <section class="content-area">
        <div class="content-header">
          <h2>My Profile</h2>
        </div>

        <div id="alert-box" class="alert hidden"></div>

        <div class="card" style="max-width:600px;" id="profile-card">
          <div id="profile-content">
            <p class="loading-text" style="padding:2rem 0;">Loading profile...</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const role = localStorage.getItem('role');
      if (!role) { window.location.href = '/login'; return; }

      try {
        const response = await fetch('/api/auth/profile');
        if (!response.ok) throw new Error('Could not fetch profile');
        const user = await response.json();

        const date        = new Date(user.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' });
        const roleDisplay = user.role === 'employer' ? 'Employer / Recruiter' : 'Job Seeker';
        const badgeClass  = user.role === 'employer' ? 'badge-primary' : 'badge-success';

        document.getElementById('profile-content').innerHTML = `
          <div class="profile-header">
            <div class="profile-avatar">${user.name.charAt(0).toUpperCase()}</div>
            <div class="profile-info">
              <h3>${user.name}</h3>
              <span class="badge ${badgeClass}">${roleDisplay}</span>
            </div>
          </div>
          <div class="profile-data-rows">
            <div class="data-row">
              <span class="data-label">Email</span>
              <span class="data-value">${user.email}</span>
            </div>
            <div class="data-row">
              <span class="data-label">Phone</span>
              <span class="data-value">${user.phone}</span>
            </div>
            <div class="data-row">
              <span class="data-label">Address</span>
              <span class="data-value">${user.address}</span>
            </div>
            <div class="data-row">
              <span class="data-label">Member Since</span>
              <span class="data-value">${date}</span>
            </div>
            ${user.addressProof ? `
            <div class="data-row">
              <span class="data-label">ID Proof</span>
              <span class="data-value">
                <a href="/${user.addressProof}" target="_blank" class="btn btn-ghost btn-sm">View Document &rarr;</a>
              </span>
            </div>` : ''}
          </div>`;
      } catch (err) {
        document.getElementById('profile-content').innerHTML = `<p class="alert alert-error">Failed to load profile. Please sign in again.</p>`;
      }
    });
  </script>
</body>
</html>
