<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job — Daily Jobs</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/" class="brand">
        <span class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </span>
        Daily<span class="brand-dot">Jobs</span>
      </a>
      <div class="nav-links" id="nav-links">
        <!-- Injected via JS -->
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <nav class="sidebar-nav">
          <a href="/dashboard" class="sidebar-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
          </a>
          <a href="/profile" class="sidebar-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            My Profile
          </a>
          <div class="sidebar-divider"></div>
          <a href="/post-job" class="sidebar-link active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Post a Job
          </a>
        </nav>
      </aside>

      <!-- Content -->
      <section class="content-area">
        <div class="content-header">
          <div>
            <h2>Post a Daily Wage Job</h2>
            <p style="color:var(--text-muted); font-size:0.9rem; margin:0;">Fill in the details below to find workers in your area.</p>
          </div>
        </div>

        <div class="card" style="max-width:600px;">
          <div id="alert-box" class="alert hidden"></div>

          <form id="post-job-form">
            <div class="form-group">
              <label class="form-label" for="title">Job Title</label>
              <input type="text" id="title" class="form-control" required placeholder="e.g. Construction Helper, House Cleaner">
            </div>

            <div class="form-group">
              <label class="form-label" for="description">Description & Tasks</label>
              <textarea id="description" class="form-control" rows="4" required placeholder="Describe the work — what needs to be done, duration, requirements..."></textarea>
            </div>

            <div class="form-row">
              <div class="form-group" style="flex:2">
                <label class="form-label" for="location">Location / Area</label>
                <input type="text" id="location" class="form-control" required placeholder="e.g. Koramangala, Bangalore">
              </div>
              <div class="form-group" style="flex:1">
                <label class="form-label" for="wage">Daily Wage (₹)</label>
                <input type="number" id="wage" class="form-control" min="100" required placeholder="350">
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" style="padding:0.8rem; margin-top:0.5rem">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              Publish Job
            </button>
          </form>
        </div>
      </section>
    </div>
  </main>

  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const role = localStorage.getItem('role');
      if (role !== 'employer') { window.location.href = '/dashboard'; return; }
    });

    document.getElementById('post-job-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title       = document.getElementById('title').value;
      const description = document.getElementById('description').value;
      const location    = document.getElementById('location').value;
      const wage        = document.getElementById('wage').value;

      try {
        await fetchAPI('/jobs', {
          method: 'POST',
          body: JSON.stringify({ title, description, location, wage })
        });
        showAlert('Job published successfully!', 'success');
        document.getElementById('post-job-form').reset();
        setTimeout(() => { window.location.href = '/dashboard'; }, 1800);
      } catch (err) {
        showAlert(err.message, 'error');
      }
    });
  </script>
</body>
</html>
