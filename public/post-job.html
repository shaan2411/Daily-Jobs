<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job — Daily Jobs</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="brand">
        <span class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </span>
        Daily<span class="brand-dot">Jobs</span>
      </a>
      <div class="nav-links" id="nav-links">
        <!-- Injected via JS -->
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <nav class="sidebar-nav">
          <a href="index.html" class="sidebar-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
          </a>
          <a href="jobs.html" class="sidebar-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Find Jobs
          </a>
          <a href="dashboard.html" class="sidebar-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Dashboard
          </a>
          <a href="profile.html" class="sidebar-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Profile
          </a>
          <div class="sidebar-divider"></div>
          <a href="post-job.html" class="sidebar-link active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Post a Job
          </a>
        </nav>
      </aside>

      <!-- Content -->
      <section class="content-area">
        <div class="content-header">
          <div>
            <h2>Post a Daily Wage Job</h2>
            <p style="color:var(--text-muted); font-size:0.9rem; margin:0;">Fill in the details below to find workers in your area.</p>
          </div>
        </div>

        <div class="card" style="max-width:600px;">
          <div id="alert-box" class="alert hidden"></div>

          <form id="post-job-form">
            <div class="form-group">
              <label class="form-label" for="title">Job Title</label>
              <input type="text" id="title" class="form-control" required placeholder="e.g. Construction Helper, House Cleaner">
            </div>

            <div class="form-group">
              <label class="form-label" for="description">Description & Tasks</label>
              <textarea id="description" class="form-control" rows="4" required placeholder="Describe the work — what needs to be done, duration, requirements..."></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="address">Full Address / Location</label>
              <div style="display:flex; gap:0.5rem;">
                <input type="text" id="address" class="form-control" required placeholder="e.g. 123 Street, Area, City" style="flex:1">
                <button type="button" id="search-address-btn" class="btn btn-secondary btn-sm" style="flex:shrink-0">Find</button>
              </div>
              <p id="location-hint" style="font-size:0.75rem; color:var(--text-muted); margin-top:0.3rem;">Enter address and click Find to get coordinates.</p>
              <input type="hidden" id="lat" value="0">
              <input type="hidden" id="lng" value="0">
              <input type="hidden" id="city">
              <input type="hidden" id="state">
              <input type="hidden" id="pincode">
            </div>

            <div class="form-group">
                <label class="form-label" for="wage">Daily Wage (₹)</label>
                <input type="number" id="wage" class="form-control" min="100" required placeholder="350">
            </div>

            <button type="submit" class="btn btn-primary btn-full" style="padding:0.8rem; margin-top:0.5rem">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              Publish Job
            </button>
          </form>
        </div>
      </section>
    </div>
  </main>

  <script src="/js/main.js"></script>
  <script>
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");
    if (!token) {
      window.location.href = "login.html";
    } else if (role === 'seeker') {
      window.location.href = "dashboard.html";
    }

    document.addEventListener('DOMContentLoaded', () => {
      const role = localStorage.getItem('role');
      if (role !== 'employer') { window.location.href = 'dashboard.html'; return; }
    const postJobForm = document.getElementById('post-job-form');
    const searchBtn = document.getElementById('search-address-btn');
    const addrInput = document.getElementById('address');
    
    // Nominatim Geocoding
    searchBtn.onclick = async () => {
        const query = addrInput.value;
        if (!query) return showAlert('Please enter an address first', 'error');
        
        searchBtn.disabled = true;
        searchBtn.innerText = 'Searching...';
        
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
            const data = await res.json();
            
            if (data && data.length > 0) {
                const result = data[0];
                document.getElementById('lat').value = result.lat;
                document.getElementById('lng').value = result.lon;
                
                // Try to extract city/state/pincode if possible via reverse or just use the display name
                document.getElementById('location-hint').innerHTML = `<span style="color:var(--success)">✓ Coordinates found: ${parseFloat(result.lat).toFixed(4)}, ${parseFloat(result.lon).toFixed(4)}</span>`;
                showAlert('Location verified!', 'success');
            } else {
                showAlert('Address not found. Please be more specific.', 'warning');
            }
        } catch (err) {
            showAlert('Geocoding service unavailable.', 'error');
        } finally {
            searchBtn.disabled = false;
            searchBtn.innerText = 'Find';
        }
    };

    postJobForm.onsubmit = async (e) => {
        e.preventDefault();
        
        const lat = document.getElementById('lat').value;
        if (!lat || lat === '0') return showAlert('Please verify the address location first.', 'warning');

        const formData = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            wage: document.getElementById('wage').value,
            address: addrInput.value,
            lat: document.getElementById('lat').value,
            lng: document.getElementById('lng').value,
            city: document.getElementById('city').value || 'Unknown',
            state: document.getElementById('state').value || 'Unknown',
            pincode: document.getElementById('pincode').value || ''
        };

        try {
            await fetchAPI('/jobs', {
                method: 'POST',
                body: JSON.stringify(formData)
            });
            showAlert('Job posted successfully!', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 1500);
        } catch (err) {
            showAlert(err.message, 'error');
        }
    };
    });
  </script>
</body>
</html>
