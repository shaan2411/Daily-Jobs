<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Daily Jobs</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/" class="brand">
        <span class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </span>
        Daily<span class="brand-dot">Jobs</span>
      </a>
      <div class="nav-links" id="nav-links">
        <!-- Injected via JS -->
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="dashboard-layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="sidebar-avatar">?</div>
          <div class="sidebar-username" id="sidebar-name">Loading...</div>
          <div class="sidebar-role" id="sidebar-role"></div>
        </div>
        <nav class="sidebar-nav">
          <a href="/dashboard" class="sidebar-link active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Overview
          </a>
          <a href="/profile" class="sidebar-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            My Profile
          </a>
          <div class="sidebar-divider"></div>
          <!-- Employer links -->
          <div id="employer-links" class="hidden">
            <a href="/post-job" class="sidebar-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Post a Job
            </a>
            <a href="#" class="sidebar-link" onclick="loadEmployerJobs(); return false;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
              My Posted Jobs
            </a>
          </div>
          <!-- Seeker links -->
          <div id="seeker-links" class="hidden">
            <a href="/jobs" class="sidebar-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              Browse Jobs
            </a>
            <a href="#" class="sidebar-link" onclick="loadSeekerApplications(); return false;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              My Applications
            </a>
          </div>
        </nav>
      </aside>

      <!-- Main Content -->
      <section class="content-area">
        <div id="alert-box" class="alert hidden"></div>

        <div class="content-header">
          <h2 id="section-title">Overview</h2>
          <div id="header-action"></div>
        </div>

        <div id="dashboard-content">
          <p class="loading-text">Loading activity...</p>
        </div>
      </section>
    </div>
  </main>

  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const role = localStorage.getItem('role');
      if (!role) { window.location.href = '/login'; return; }

      // Load user info for sidebar
      try {
        const r = await fetch('/api/auth/profile');
        if (r.ok) {
          const u = await r.json();
          document.getElementById('sidebar-avatar').textContent = u.name.charAt(0).toUpperCase();
          document.getElementById('sidebar-name').textContent   = u.name;
          document.getElementById('sidebar-role').textContent   = role === 'employer' ? 'Employer' : 'Job Seeker';
        }
      } catch(_) {}

      if (role === 'employer') {
        document.getElementById('employer-links').classList.remove('hidden');
        loadEmployerJobs();
      } else {
        document.getElementById('seeker-links').classList.remove('hidden');
        loadSeekerApplications();
      }
    });

    // ---- Employer ----
    async function loadEmployerJobs() {
      document.getElementById('section-title').textContent = 'My Posted Jobs';
      document.getElementById('header-action').innerHTML   = `<a href="/post-job" class="btn btn-primary btn-sm">+ Post New Job</a>`;
      const content = document.getElementById('dashboard-content');
      content.innerHTML = '<p class="loading-text">Loading your jobs...</p>';

      try {
        const response = await fetch('/api/jobs/employer');
        const jobs = await response.json();

        if (jobs.length === 0) {
          content.innerHTML = `
            <div class="card" style="text-align:center; padding:3rem;">
              <div style="font-size:2.5rem; margin-bottom:1rem;">📋</div>
              <h3 style="margin-bottom:0.5rem;">No jobs posted yet</h3>
              <p>Post your first job and start receiving applications.</p>
              <a href="/post-job" class="btn btn-primary" style="margin-top:1rem">Post a Job</a>
            </div>`;
          return;
        }

        content.innerHTML = `
          <div class="stat-cards" style="margin-bottom:1.5rem;">
            <div class="stat-card">
              <div class="label">Total Jobs</div>
              <div class="value">${jobs.length}</div>
            </div>
            <div class="stat-card">
              <div class="label">Open Jobs</div>
              <div class="value">${jobs.filter(j => j.status === 'open').length}</div>
            </div>
          </div>
          <div style="display:flex; flex-direction:column; gap:0.85rem;">
            ${jobs.map(job => {
              const date = new Date(job.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
              const isOpen = job.status === 'open';
              return `
                <div class="job-card" style="flex-direction:row; align-items:center; gap:1rem; flex-wrap:wrap;">
                  <div style="flex:1; min-width:200px;">
                    <div style="display:flex; align-items:center; gap:0.6rem; margin-bottom:0.35rem;">
                      <h3 style="font-size:1rem;">${job.title}</h3>
                      <span class="badge ${isOpen ? 'badge-success' : 'badge-danger'}">${job.status.toUpperCase()}</span>
                    </div>
                    <div class="job-meta" style="margin-bottom:0;">
                      <span class="job-meta-item">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        ${job.location}
                      </span>
                      <span class="job-meta-item wage">₹${job.wage}/day</span>
                      <span class="job-meta-item">${date}</span>
                    </div>
                  </div>
                  <button onclick="viewApplications('${job._id}')" class="btn btn-secondary btn-sm">View Applications</button>
                </div>`;
            }).join('')}
          </div>`;
      } catch (err) {
        content.innerHTML = `<p class="alert alert-error">Failed to load jobs.</p>`;
      }
    }

    async function viewApplications(jobId) {
      document.getElementById('section-title').textContent = 'Job Applications';
      document.getElementById('header-action').innerHTML   = `<button onclick="loadEmployerJobs()" class="btn btn-ghost btn-sm">&larr; Back to Jobs</button>`;
      const content = document.getElementById('dashboard-content');
      content.innerHTML = '<p class="loading-text">Loading applications...</p>';

      try {
        const response = await fetch(`/api/jobs/${jobId}/applications`);
        const apps = await response.json();

        if (apps.length === 0) {
          content.innerHTML = `<div class="card" style="text-align:center; padding:3rem;"><h3>No applications yet</h3><p>Share the job listing to attract applicants.</p></div>`;
          return;
        }

        content.innerHTML = `<div style="display:flex;flex-direction:column;gap:0.85rem;">
          ${apps.map(app => {
            const date   = new Date(app.appliedAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
            const seeker = app.seekerId;
            return `
              <div class="card" style="padding:1.25rem;">
                <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1rem;">
                  <div class="sidebar-avatar" style="width:38px;height:38px;font-size:1rem;">${seeker.name.charAt(0).toUpperCase()}</div>
                  <div>
                    <div style="font-weight:600; color:var(--text);">${seeker.name}</div>
                    <div style="font-size:0.8rem; color:var(--text-muted);">Applied on ${date}</div>
                  </div>
                  <span class="badge badge-primary" style="margin-left:auto;">Status: ${app.status}</span>
                </div>
                <div class="job-meta">
                  <span class="job-meta-item">📞 ${seeker.phone}</span>
                  <span class="job-meta-item">✉️ ${seeker.email}</span>
                </div>
                <p style="font-size:0.85rem; margin:0; color:var(--text-muted);">📍 ${seeker.address}</p>
              </div>`;
          }).join('')}
        </div>`;
      } catch (err) {
        content.innerHTML = `<p class="alert alert-error">Failed to load applications.</p>`;
      }
    }

    // ---- Seeker ----
    async function loadSeekerApplications() {
      document.getElementById('section-title').textContent = 'My Applications';
      document.getElementById('header-action').innerHTML   = `<a href="/jobs" class="btn btn-primary btn-sm">Browse More Jobs</a>`;
      const content = document.getElementById('dashboard-content');
      content.innerHTML = '<p class="loading-text">Loading your applications...</p>';

      try {
        const response = await fetch('/api/jobs/applications');
        const apps = await response.json();

        if (apps.length === 0) {
          content.innerHTML = `
            <div class="card" style="text-align:center; padding:3rem;">
              <div style="font-size:2.5rem; margin-bottom:1rem;">🔍</div>
              <h3 style="margin-bottom:0.5rem;">No applications yet</h3>
              <p>Browse available jobs and submit your first application.</p>
              <a href="/jobs" class="btn btn-primary" style="margin-top:1rem">Browse Jobs</a>
            </div>`;
          return;
        }

        content.innerHTML = `
          <div class="stat-cards" style="margin-bottom:1.5rem;">
            <div class="stat-card">
              <div class="label">Total Applied</div>
              <div class="value">${apps.length}</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:0.85rem;">
            ${apps.map(app => {
              const job  = app.jobId;
              const date = new Date(app.appliedAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
              return `
                <div class="job-card" style="flex-direction:row;align-items:center;gap:1rem;flex-wrap:wrap;">
                  <div style="flex:1;min-width:200px;">
                    <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.35rem;">
                      <h3 style="font-size:1rem;">${job.title}</h3>
                    </div>
                    <div class="job-meta" style="margin-bottom:0;">
                      <span class="job-meta-item">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        ${job.location}
                      </span>
                      <span class="job-meta-item wage">₹${job.wage}/day</span>
                      <span class="job-meta-item">Applied ${date}</span>
                    </div>
                  </div>
                  <span class="badge badge-primary">Status: ${app.status}</span>
                </div>`;
            }).join('')}
          </div>`;
      } catch (err) {
        content.innerHTML = `<p class="alert alert-error">Failed to load applications.</p>`;
      }
    }
  </script>
</body>
</html>
