<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Daily Jobs</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Dashboard specific refinements */
    .dashboard-container {
      display: flex;
      min-height: 100vh;
    }
    .main-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .top-bar {
      height: 70px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .top-bar-search {
      flex: 1;
      max-width: 400px;
      position: relative;
    }
    .top-bar-search input {
      padding-left: 2.5rem;
    }
    .top-bar-search svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    .top-bar-actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .user-profile-toggle {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
    }
    .user-name {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .user-avatar {
      width: 36px;
      height: 36px;
      background: var(--primary-dim);
      color: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .stats-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }
    .stat-card-new {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      border: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: transform var(--transition);
    }
    .stat-card-new:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }
    .stat-card-label {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-card-value {
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--text);
    }
    .activity-section {
      padding: 0 2rem 2rem;
    }
    .activity-card {
      background: #fff;
      border-radius: var(--radius-lg);
      border: 1px solid var(--card-border);
      overflow: hidden;
    }
    .activity-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .activity-list {
      display: flex;
      flex-direction: column;
    }
    .activity-item {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: background 0.2s;
    }
    .activity-item:last-child {
      border-bottom: none;
    }
    .activity-item:hover {
      background: #f8fafc;
    }
    .activity-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .activity-info {
      flex: 1;
    }
    .activity-title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }
    .activity-time {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .sidebar-new {
      width: 260px;
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .sidebar-logo {
      margin-bottom: 2.5rem;
      padding-left: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar-new">
      <div class="sidebar-logo">
        <a href="index.html" class="brand">
          <span class="brand-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          </span>
          Daily<span class="brand-dot">Jobs</span>
        </a>
      </div>

      <nav class="sidebar-nav">
        <a href="index.html" class="sidebar-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a>
        <a href="jobs.html" class="sidebar-link" id="side-find-jobs">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Find Jobs
        </a>
        <a href="dashboard.html" class="sidebar-link active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="profile.html" class="sidebar-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
        <a href="#" class="sidebar-link" id="nav-notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Notifications
        </a>
        <div class="sidebar-divider"></div>
        <a href="#" class="sidebar-link" id="logout-btn-dash" style="color:var(--danger);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </a>
      </nav>
    </aside>

    <main class="main-wrapper">
      <!-- Top Bar -->
      <header class="top-bar">
        <div class="top-bar-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="form-control" placeholder="Search for jobs, applications...">
        </div>
        <div class="top-bar-actions">
          <div class="nav-notif-wrapper">
            <button class="notif-btn" id="notif-toggle">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="notif-badge hidden" id="global-notif-badge">0</span>
            </button>
          </div>
          <div class="user-profile-toggle" onclick="window.location.href='profile.html'">
            <div class="user-name" id="userName">User</div>
            <div class="user-avatar" id="userAvatar">U</div>
          </div>
        </div>
      </header>

      <!-- Stats Cards -->
      <section class="stats-container">
        <div class="stat-card-new">
          <span class="stat-card-label">Total Jobs Applied</span>
          <div class="stat-card-value" id="appliedCount">0</div>
        </div>
        <div class="stat-card-new">
          <span class="stat-card-label">Available Jobs</span>
          <div class="stat-card-value" id="jobCount">0</div>
        </div>
        <div class="stat-card-new">
          <span class="stat-card-label">Notifications</span>
          <div class="stat-card-value" id="notifyCount">0</div>
        </div>
      </section>

      <!-- Recent Activity -->
      <section class="activity-section">
        <div class="activity-card">
          <div class="activity-header">
            <h3>Recent Activity</h3>
            <a href="#" class="btn btn-ghost btn-sm" id="view-all-activity">View All</a>
          </div>
          <div class="activity-list" id="activity-list">
             <!-- Activity items injected here -->
             <p class="loading-text">Loading activity items...</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="alert-box" class="alert hidden"></div>

  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem("token");
      const userId = localStorage.getItem('userId');

      if (!token || !userId) {
         window.location.href = "login.html";
         return;
      }

      // Role-based UI adjustments
      const role = localStorage.getItem("role");
      if (role === 'employer') {
          const findJobsLink = document.getElementById('side-find-jobs');
          if (findJobsLink) findJobsLink.style.display = 'none';

          // Change stats labels for employer
          const statsLabels = document.querySelectorAll('.stat-card-label');
          statsLabels.forEach(label => {
              if (label.innerText === 'Total Jobs Applied') {
                  label.innerText = 'Total Jobs Posted';
              }
          });
      }

      // Load Profile Data
      try {
        const user = await fetchAPI('/user/' + userId);
        if (user) {
          document.getElementById('userName').innerText = user.name;
          document.getElementById('userAvatar').innerText = user.name.charAt(0).toUpperCase();
        }
      } catch (err) {
        console.error('Failed to load user', err);
      }

      // Load Dashboard Stats
      try {
        const data = await fetchAPI('/dashboard/' + userId);
        document.getElementById('appliedCount').innerText = data.applied;
        document.getElementById('jobCount').innerText = data.jobs;
        document.getElementById('notifyCount').innerText = data.notifications;
        
        const badge = document.getElementById('global-notif-badge');
        if (data.notifications > 0) {
          badge.innerText = data.notifications;
          badge.classList.remove('hidden');
        }
      } catch (err) {
        console.error('Failed to load dashboard stats', err);
      }

      // Load Recent Activity (Role-based)
      try {
        const endpoint = (role === 'employer') ? '/jobs/applications/employer' : ('/applications/' + userId);
        const apps = await fetchAPI(endpoint);
        const activityList = document.getElementById('activity-list');
        const activityHeaderTitle = document.getElementById('activity-header-title');
        
        if (role === 'employer' && activityHeaderTitle) {
            activityHeaderTitle.innerText = 'Recent Applicants';
        }

        activityList.innerHTML = '';

        if (!apps || apps.length === 0) {
          activityList.innerHTML = '<p class="loading-text">No recent activity found.</p>';
        } else {
          // Show last 5
          const recent = apps.sort((a,b) => new Date(b.appliedAt) - new Date(a.appliedAt)).slice(0, 5);
          activityList.innerHTML = recent.map(app => {
            const date = new Date(app.appliedAt).toLocaleDateString();
            const jobTitle = app.jobId ? app.jobId.title : 'Deleted Job';
            const statusColor = app.status === 'approved' ? 'var(--success)' : (app.status === 'rejected' ? 'var(--danger)' : 'var(--primary)');
            
            if (role === 'employer' && app.seekerId) {
                // Employer View: Show seeker details and Accept button
                return `
                  <div class="activity-item">
                    <div class="activity-icon" style="background: var(--success-dim); color: var(--success);">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div class="activity-info">
                      <div class="activity-title"><strong>${app.seekerId.name}</strong> applied for <strong>${jobTitle}</strong></div>
                      <div class="activity-time">${app.seekerId.phone} &bull; ${app.seekerId.email} &bull; ${date}</div>
                      <div style="margin-top:0.5rem">
                         ${app.status === 'pending' ? 
                           `<button onclick="acceptApplication('${app._id}')" class="btn btn-primary btn-sm">Accept Applicant</button>` :
                           `<span style="color:${statusColor}; font-weight:600;">Status: ${app.status.toUpperCase()}</span>`
                         }
                      </div>
                    </div>
                  </div>
                `;
            } else {
                // Seeker View: Show application status
                const isApproved = app.status === 'approved';
                const employer = (app.jobId && app.jobId.employerId) ? app.jobId.employerId : null;
                
                return `
                  <div class="activity-item">
                    <div class="activity-icon" style="background: var(--primary-dim); color: var(--primary);">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect x="2" y="7" width="20" height="14" rx="2"/></svg>
                    </div>
                    <div class="activity-info">
                      <div class="activity-title">Applied for <strong>${jobTitle}</strong></div>
                      <div class="activity-time">${date} &bull; Status: <span style="color:${statusColor}; font-weight:600;">${app.status.toUpperCase()}</span></div>
                      ${isApproved && employer ? `
                        <div style="margin-top:0.8rem; padding:0.6rem; background:rgba(16, 185, 129, 0.1); border-radius:6px; border:1px solid rgba(16, 185, 129, 0.2);">
                           <div style="font-weight:600; font-size:0.8rem; color:var(--success); margin-bottom:0.2rem;">ACCEPTED! CONTACT EMPLOYER:</div>
                           <div style="font-size:0.9rem;"><strong>${employer.name}</strong></div>
                           <div style="font-size:0.85rem; color:var(--text-muted); margin-bottom:0.5rem;">${employer.phone} &bull; ${employer.email}</div>
                           <div>
                              <a href="tel:${employer.phone}" class="btn btn-primary btn-sm" style="background:var(--success); border-color:var(--success)">Call Now</a>
                              <a href="mailto:${employer.email}" class="btn btn-ghost btn-sm">Email</a>
                           </div>
                        </div>
                      ` : ''}
                    </div>
                  </div>
                `;
            }
          }).join('');
        }
      } catch (err) {
        console.error('Activity Error:', err);
        document.getElementById('activity-list').innerHTML = '<p class="loading-text">Failed to load recent activity.</p>';
      }

      // Accept Application Function
      window.acceptApplication = async (appId) => {
          if (!confirm('Are you sure you want to accept this applicant?')) return;
          try {
              await fetchAPI('/accept', {
                  method: 'POST',
                  body: JSON.stringify({ appId, userId })
              });
              showAlert('Applicant accepted! Notification sent.', 'success');
              setTimeout(() => location.reload(), 1500);
          } catch (err) {
              showAlert(err.message, 'error');
          }
      }

      // Logout handler
      document.getElementById('logout-btn-dash').onclick = (e) => {
        e.preventDefault();
        localStorage.clear();
        window.location.href = 'login.html';
      };

      // Notifications sidebar link
      document.getElementById('nav-notifications').onclick = (e) => {
        e.preventDefault();
        const toggle = document.getElementById('notif-toggle');
        if (toggle) toggle.click();
      };
      
      // View all activity
      document.getElementById('view-all-activity').onclick = (e) => {
        e.preventDefault();
        // Just show all for now or scroll? 
        // For simplicity redirect to applications list if we had one, 
        // but here we just show recent 5.
      };
    });
  </script>
</body>
</html>
