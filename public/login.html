<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Daily Jobs</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="auth-page">

    <!-- Left brand panel -->
    <div class="auth-brand-panel">
      <div class="auth-panel-content">
        <a href="/" class="brand">
          <span class="brand-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          </span>
          Daily<span class="brand-dot">Jobs</span>
        </a>
        <h2>Welcome back.<br>Good to see you.</h2>
        <p>Sign in to access your dashboard, track applications, and connect with local opportunities instantly.</p>
        <div class="auth-panel-features">
          <div class="auth-panel-feat"><span class="dot"></span> Access your job applications</div>
          <div class="auth-panel-feat"><span class="dot"></span> Post or manage job listings</div>
          <div class="auth-panel-feat"><span class="dot"></span> Connect with workers nearby</div>
        </div>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="auth-form-panel">
      <div class="auth-form-box">
        <h2>Sign In</h2>
        <p class="subtitle">Don't have an account? <a href="/register">Create one free</a></p>

        <div id="alert-box" class="alert hidden"></div>

        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-control" required placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-control" required placeholder="Your password">
          </div>
          <div class="form-group">
            <label class="form-label" for="role">I am a</label>
            <select id="role" class="form-control" required>
              <option value="seeker">Job Seeker</option>
              <option value="employer">Employer / Recruiter</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem; padding: 0.8rem;">Sign In</button>
        </form>

        <div style="margin-top: 2rem; text-align: center;">
          <a href="/" style="font-size:0.85rem; color:var(--text-muted)">&larr; Back to home</a>
        </div>
      </div>
    </div>

  </div>

  <script src="/js/main.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role').value;

      try {
        const data = await fetchAPI('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password, role })
        });
        localStorage.setItem('userId', data.userId);
        localStorage.setItem('role', role);
        window.location.href = '/dashboard';
      } catch (err) {
        showAlert(err.message, 'error');
      }
    });
  </script>
</body>
</html>
