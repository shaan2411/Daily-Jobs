<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Jobs — Daily Jobs</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="brand">
        <span class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </span>
        Daily<span class="brand-dot">Jobs</span>
      </a>
      <div class="nav-links" id="nav-links">
        <!-- Injected via JS -->
      </div>
    </div>
  </nav>

  <!-- Page Hero with Search -->
  <div class="page-hero">
    <div class="container">
      <span class="hero-eyebrow" style="margin-bottom:0.85rem">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
        Open Positions
      </span>
      <h1>Available Daily Wage Jobs</h1>
      <p>Browse local opportunities and apply instantly.</p>

      <div class="search-bar-container" style="background:white; padding:1.5rem; border-radius:20px; box-shadow:var(--shadow-xl); border:1px solid var(--brand-border); margin-top:1.5rem;">
        <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap:1rem; align-items:end;">
          <div class="form-group" style="margin:0">
            <label class="form-label" style="font-size:0.7rem; color:var(--text-muted)">Keyword</label>
            <input type="text" id="search-keyword" class="form-control" placeholder="e.g. Carpenter, Cleaner">
          </div>
          <div class="form-group" style="margin:0">
            <label class="form-label" style="font-size:0.7rem; color:var(--text-muted)">City / Region</label>
            <div style="display:flex; gap:0.5rem">
               <input type="text" id="search-city" class="form-control" placeholder="Enter city...">
               <button id="use-location-btn" class="btn btn-ghost" title="Use GPS" style="padding:0.5rem">
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
               </button>
            </div>
          </div>
          <button onclick="handleSearch()" class="btn btn-primary" style="height:45px; padding:0 2rem;">Find Jobs</button>
        </div>
        
        <div style="margin-top:1.2rem; padding-top:1rem; border-top:1px solid var(--brand-border); display:flex; align-items:center; gap:1.5rem;">
          <div style="display:flex; align-items:center; gap:1rem; flex:1">
            <label style="font-size:0.75rem; font-weight:700; color:var(--text-muted); min-width:80px">RADIUS: <span id="radius-val" style="color:var(--primary)">25km</span></label>
            <input type="range" id="radius-slider" min="5" max="500" step="5" value="25" style="flex:1; accent-color:var(--primary)">
          </div>
          <button onclick="clearSearch()" class="btn btn-ghost btn-sm">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <main class="container" style="padding: 2.5rem 1.5rem;">
    <div id="alert-box" class="alert hidden"></div>

        <!-- Map Toggle & Container -->
        <div style="margin-bottom:2rem;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <h3 style="margin:0; font-size:1.1rem;">Geographic View</h3>
                <button id="toggle-map-btn" class="btn btn-ghost btn-sm" style="color:var(--primary); font-weight:700;">Show Map</button>
            </div>
            <div id="map-container" class="hidden" style="height:400px; border-radius:16px; overflow:hidden; border:1px solid var(--brand-border); box-shadow:var(--shadow-md);">
                <div id="map" style="height:100%; width:100%;"></div>
            </div>
        </div>

    <div id="jobsContainer" class="jobs-grid">
      <p class="loading-text">Loading jobs...</p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 <a href="index.html">Daily Jobs</a> &mdash; College Mini Project.</p>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script>
    const token = localStorage.getItem("token");
    if (!token) {
        window.location.href = "login.html";
    }

    const role = localStorage.getItem("role");
    if (role === 'employer') {
        window.location.href = "dashboard.html";
    }

    let userLat = null;
    let userLng = null;
    let map = null;
    let markers = [];
    const radiusSlider = document.getElementById('radius-slider');
    const radiusVal = document.getElementById('radius-val');
    const locationBtn = document.getElementById('use-location-btn');
    const mapToggleBtn = document.getElementById('toggle-map-btn');
    const mapContainer = document.getElementById('map-container');

    mapToggleBtn.onclick = () => {
        const isHidden = mapContainer.classList.toggle('hidden');
        mapToggleBtn.innerText = isHidden ? 'Show Map' : 'Hide Map';
        if (!isHidden && !map) {
            initMap();
        } else if (!isHidden) {
            map.invalidateSize();
        }
    };

    function initMap() {
        map = L.map('map').setView([20.5937, 78.9629], 5); // India center
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        updateMapMarkers();
    }

    function updateMapMarkers() {
        if (!map) return;
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        // Add user marker if exists
        if (userLat && userLng) {
            const userMarker = L.circleMarker([userLat, userLng], {
                color: 'var(--primary)',
                fillColor: 'var(--primary)',
                fillOpacity: 0.5,
                radius: 10
            }).addTo(map).bindPopup("<b>You are here</b>");
            markers.push(userMarker);
            map.setView([userLat, userLng], 12);
        }
    }

    radiusSlider.oninput = (e) => {
        radiusVal.innerText = e.target.value + 'km';
    };

    radiusSlider.onchange = () => {
        loadJobs();
    };

    function handleSearch() {
        const city = document.getElementById('search-city').value;
        if (city) {
            geocodeCity(city);
        } else {
            loadJobs();
        }
    }

    async function geocodeCity(city) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`);
            const data = await res.json();
            if (data && data.length > 0) {
                userLat = parseFloat(data[0].lat);
                userLng = parseFloat(data[0].lon);
                if (map) updateMapMarkers();
                loadJobs();
            } else {
                showAlert('Location not found. Try a different city.', 'warning');
            }
        } catch (err) {
            console.error("Geocoding failed", err);
        }
    }

    function clearSearch() {
        document.getElementById('search-keyword').value = '';
        document.getElementById('search-city').value = '';
        userLat = null;
        userLng = null;
        radiusSlider.value = 25;
        radiusVal.innerText = '25km';
        if (map) markers.forEach(m => map.removeLayer(m));
        loadJobs();
    }

    locationBtn.onclick = () => {
        if ("geolocation" in navigator) {
            locationBtn.disabled = true;
            locationBtn.innerText = '...';
            navigator.geolocation.getCurrentPosition(position => {
                userLat = position.coords.latitude;
                userLng = position.coords.longitude;
                locationBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
                locationBtn.disabled = false;
                if (map) updateMapMarkers();
                loadJobs();
            }, err => {
                showAlert('Location access denied.', 'warning');
                locationBtn.disabled = false;
                locationBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
            });
        }
    };

    async function loadJobs() {
        const userId = localStorage.getItem("userId");
        const container = document.getElementById("jobsContainer");
        const radius = radiusSlider.value;

        try {
            let jobsUrl = `/api/jobs?radius=${radius}`;
            if (userLat && userLng) {
                jobsUrl += `&lat=${userLat}&lng=${userLng}`;
            }

            const keyword = document.getElementById('search-keyword').value.toLowerCase();

            // Fetch jobs and user's applications in parallel
            const [jobsData, apps] = await Promise.all([
                fetch(jobsUrl).then(res => res.json()),
                fetch(`/api/applications/${userId}`).then(res => res.json())
            ]);

            let jobs = jobsData.jobs || jobsData; // Handle both search and full list response
            
            // Client-side keyword filter
            if (keyword) {
                jobs = jobs.filter(j => 
                    j.title.toLowerCase().includes(keyword) || 
                    j.description.toLowerCase().includes(keyword)
                );
            }

            const appliedJobIds = new Set(apps.map(app => app.jobId._id || app.jobId));
            
            container.innerHTML = "";

            if (!jobs || jobs.length === 0) {
              container.innerHTML = `
                <div style="grid-column:1/-1; text-align:center; padding:4rem 2rem;">
                  <div style="font-size:2.5rem; margin-bottom:1rem;">🔍</div>
                  <h3 style="margin-bottom:0.5rem;">No jobs found nearby</h3>
                  <p>Try increasing the search radius or check back soon.</p>
                </div>`;
              return;
            }

            // Add markers to map if map is open
            if (map) {
                jobs.forEach(job => {
                    if (job.location?.coordinates) {
                        const m = L.marker([job.location.coordinates[1], job.location.coordinates[0]])
                            .addTo(map)
                            .bindPopup(`<b>${job.title}</b><br>₹${job.wage}/day<br>${job.city || ''}`);
                        markers.push(m);
                    }
                });
            }

            jobs.forEach(job => {
              const date = new Date(job.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
              const salary = job.wage || job.salary || "N/A";
              const isApplied = appliedJobIds.has(job._id);
              const distance = job.distance_km ? `${job.distance_km} km away` : (job.location?.coordinates ? 'Near' : '');
              
              container.innerHTML += `
                <div class="job-card">
                  <div class="job-card-header">
                    <div>
                        <h3 style="margin-bottom:0.4rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${job.title}">${job.title}</h3>
                        <div style="display:inline-flex; align-items:center; gap:0.4rem; padding:0.25rem 0.5rem; background:rgba(30,58,138,0.04); border:1px solid rgba(30,58,138,0.1); border-radius:8px; max-width:100%; overflow:hidden;">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            <span style="font-size:0.7rem; color:var(--text-main); font-weight:700; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${job.city || (job.distance_km ? 'Nearby' : 'Local Site')}</span>
                            ${job.distance_km ? `<span style="font-size:0.7rem; color:var(--primary); font-weight:700; white-space:nowrap;">(${job.distance_km} km)</span>` : ''}
                        </div>
                    </div>
                    <span class="badge ${isApplied ? 'badge-primary' : 'badge-success'}">${isApplied ? 'Applied' : 'Open'}</span>
                  </div>
                  <p class="job-desc">${job.description}</p>
                  <div class="job-meta">
                    <span class="job-meta-item">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                      ${job.city || job.location || 'Site Location'}
                    </span>
                    <span class="job-meta-item wage">₹${salary}/day</span>
                  </div>
                  <div class="job-card-footer">
                    <div class="employer-info">
                      <span>${date}</span>
                    </div>
                    ${isApplied ? 
                        `<button class="btn btn-ghost btn-full btn-sm" disabled style="opacity:0.7">Already Applied</button>` :
                        `<button onclick="applyJob('${job._id}')" class="btn btn-primary btn-full btn-sm">Apply for this Job</button>`
                    }
                  </div>
                </div>`;
            });
        } catch (err) {
            console.error("Failed to load jobs", err);
            container.innerHTML = "<p class='loading-text'>Error loading jobs. Please try refreshing.</p>";
        }
    }

    // Initialize
    loadJobs();

  </script>
</body>
</html>
