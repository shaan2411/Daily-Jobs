<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Jobs — Daily Jobs</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/" class="brand">
        <span class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </span>
        Daily<span class="brand-dot">Jobs</span>
      </a>
      <div class="nav-links" id="nav-links">
        <!-- Injected via JS -->
      </div>
    </div>
  </nav>

  <!-- Page Hero with Search -->
  <div class="page-hero">
    <div class="container">
      <span class="hero-eyebrow" style="margin-bottom:0.85rem">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
        Open Positions
      </span>
      <h1>Available Daily Wage Jobs</h1>
      <p>Browse local opportunities and apply instantly.</p>

      <div class="search-bar" style="max-width:580px; margin-bottom:1.5rem;">
        <input type="text" id="search-location" class="form-control" placeholder="Search by location or area..." id="search-input">
        <button onclick="searchJobs()" class="btn btn-primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Search
        </button>
        <button onclick="loadAllJobs()" class="btn btn-ghost">Clear</button>
      </div>
    </div>
  </div>

  <main class="container" style="padding: 2.5rem 1.5rem;">
    <div id="alert-box" class="alert hidden"></div>
    <div id="jobs-container" class="jobs-grid">
      <p class="loading-text">Loading jobs...</p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 <a href="/">Daily Jobs</a> &mdash; College Mini Project.</p>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { loadAllJobs(); });

    async function loadAllJobs() {
      document.getElementById('search-location').value = '';
      fetchJobs('/api/jobs');
    }

    function searchJobs() {
      const location = document.getElementById('search-location').value;
      if (!location) return loadAllJobs();
      fetchJobs(`/api/jobs?location=${encodeURIComponent(location)}`);
    }

    async function fetchJobs(url) {
      const container = document.getElementById('jobs-container');
      container.innerHTML = '<p class="loading-text">Loading jobs...</p>';
      try {
        const response = await fetch(url);
        const jobs = await response.json();
        if (jobs.length === 0) {
          container.innerHTML = `
            <div style="grid-column:1/-1; text-align:center; padding:4rem 2rem;">
              <div style="font-size:2.5rem; margin-bottom:1rem;">🔍</div>
              <h3 style="margin-bottom:0.5rem;">No jobs found</h3>
              <p>Try a different location or check back soon.</p>
            </div>`;
          return;
        }
        container.innerHTML = jobs.map(job => {
          const date         = new Date(job.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
          const employerName = job.employerId ? job.employerId.name  : 'Unknown';
          const employerPhone= job.employerId ? job.employerId.phone : 'N/A';
          return `
            <div class="job-card">
              <div class="job-card-header">
                <h3>${job.title}</h3>
                <span class="badge badge-success">Open</span>
              </div>
              <p class="job-desc">${job.description}</p>
              <div class="job-meta">
                <span class="job-meta-item">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  ${job.location}
                </span>
                <span class="job-meta-item wage">₹${job.wage}/day</span>
              </div>
              <div class="job-card-footer">
                <div class="employer-info">
                  <span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    ${employerName} &bull; ${employerPhone}
                  </span>
                  <span>${date}</span>
                </div>
                <button onclick="applyJob('${job._id}')" class="btn btn-primary btn-full btn-sm">Apply for this Job</button>
              </div>
            </div>`;
        }).join('');
      } catch (err) {
        container.innerHTML = `<p class="alert alert-error" style="grid-column:1/-1">Error loading jobs. Please try again.</p>`;
      }
    }

    async function applyJob(jobId) {
      const role = localStorage.getItem('role');
      if (!role)           { window.location.href = '/login'; return; }
      if (role !== 'seeker') { showAlert('Only Job Seekers can apply for jobs.', 'error'); return; }
      try {
        await fetchAPI(`/jobs/${jobId}/apply`, { method: 'POST' });
        showAlert('Application submitted! The employer will contact you shortly.', 'success');
      } catch (err) {
        showAlert(err.message, 'error');
      }
    }
  </script>
</body>
</html>
